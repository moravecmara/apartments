spring.application.name=rentflow

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/rentflow
spring.datasource.username=rentflow
spring.datasource.password=rentflow
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
app.jwt.secret=rentflow-secret-key-must-be-at-least-32-characters-long
app.jwt.expiration-ms=86400000

# Actuator
management.endpoints.web.exposure.include=health
