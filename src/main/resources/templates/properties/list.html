<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Nemovitosti')}"></head>
<body>
<div th:replace="~{layout :: layout('Nemovitosti', ~{::content})}">
<th:block th:fragment="content">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="bi bi-buildings me-2 text-primary"></i>Nemovitosti</h4>
  </div>

  <div th:if="${#lists.isEmpty(properties)}" class="text-center py-5 text-muted">
    <i class="bi bi-buildings fs-1"></i>
    <p class="mt-2">Zatím žádné nemovitosti.</p>
  </div>

  <div class="row g-4" th:if="${!#lists.isEmpty(properties)}">
    <div class="col-md-6 col-lg-4" th:each="prop : ${properties}">
      <div class="card stat-card h-100">
        <div class="card-body">
          <div class="d-flex align-items-start gap-3">
            <div class="icon bg-primary bg-opacity-10 text-primary" style="min-width:48px"><i class="bi bi-building"></i></div>
            <div class="flex-grow-1">
              <h6 class="fw-semibold mb-1" th:text="${prop.address}">Adresa</h6>
              <p class="text-muted small mb-2" th:text="${prop.description ?: 'Bez popisu'}">popis</p>
              <div class="d-flex gap-2 flex-wrap">
                <span class="badge bg-secondary-subtle text-secondary">
                  <i class="bi bi-door-open me-1"></i><span th:text="${prop.units.size()}">0</span> jednotek
                </span>
                <span class="badge bg-success-subtle text-success">
                  <i class="bi bi-person-check me-1"></i>
                  <span th:text="${prop.units.?[!contracts.isEmpty()].size()}">0</span> obsazeno
                </span>
              </div>
            </div>
          </div>
        </div>
        <div class="card-footer bg-transparent border-0 pt-0">
          <table class="table table-sm table-hover mb-0" th:if="${!prop.units.isEmpty()}">
            <thead><tr><th>Jednotka</th><th>Stav</th><th>Nájemce</th></tr></thead>
            <tbody>
            <tr th:each="unit : ${prop.units}">
              <td th:text="${unit.unitNumber}">—</td>
              <td>
                <span th:if="${unit.status.name()=='OCCUPIED'}" class="badge badge-paid">Obsazeno</span>
                <span th:if="${unit.status.name()=='VACANT'}" class="badge bg-light text-secondary">Volno</span>
              </td>
              <td th:text="${unit.contracts.isEmpty() ? '—' : unit.contracts[unit.contracts.size()-1].tenant.name}">—</td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

</th:block>
</div>
</body>
</html>
