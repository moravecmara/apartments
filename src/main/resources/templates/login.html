<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>RentFlow – Přihlášení</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body { background: linear-gradient(135deg,#1a1f5e 0%,#2d3494 100%); min-height:100vh; }
    .login-card { border:none; border-radius:16px; box-shadow:0 8px 40px rgba(0,0,0,.2); }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center">
<div class="container" style="max-width:420px">
  <div class="text-center mb-4">
    <h1 class="text-white fw-bold"><i class="bi bi-house-heart-fill me-2"></i>RentFlow</h1>
    <p class="text-white-50">Správa pronájmů pro malé pronajímatele</p>
  </div>
  <div class="card login-card p-4">
    <h5 class="mb-4 fw-semibold">Přihlášení</h5>
    <div th:if="${param.error}" class="alert alert-danger py-2">
      <i class="bi bi-exclamation-triangle me-1"></i>Nesprávný email nebo heslo.
    </div>
    <div th:if="${param.logout}" class="alert alert-success py-2">
      <i class="bi bi-check-circle me-1"></i>Byli jste odhlášeni.
    </div>
    <form method="post" action="/login">
      <input type="hidden" th:name="${_csrf}" th:value="${_csrf.token}" th:if="${_csrf != null}"/>
      <div class="mb-3">
        <label class="form-label fw-medium">Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" name="username" class="form-control" placeholder="demo@rentflow.cz" required autofocus/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-medium">Heslo</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2">
        <i class="bi bi-box-arrow-in-right me-2"></i>Přihlásit se
      </button>
    </form>
    <hr/>
    <div class="text-center text-muted small">
      <strong>Demo přístup:</strong> demo@rentflow.cz / Demo1234
    </div>
  </div>
</div>
</body>
</html>
