<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Platby')}"></head>
<body>
<div th:replace="~{layout :: layout('Platby', ~{::content})}">
<th:block th:fragment="content">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="bi bi-credit-card me-2 text-primary"></i>Platby</h4>
  </div>

  <div class="card stat-card">
    <div class="card-body">
      <div th:if="${#lists.isEmpty(payments)}" class="text-center py-5 text-muted">
        <i class="bi bi-credit-card fs-1"></i><p class="mt-2">Žádné platby.</p>
      </div>
      <div th:if="${!#lists.isEmpty(payments)}">
        <div class="row g-2 mb-3">
          <div class="col-sm-6 col-md-4">
            <div class="input-group input-group-sm">
              <span class="input-group-text"><i class="bi bi-search"></i></span>
              <input type="text" id="paySearch" class="form-control" placeholder="Hledat kdekoliv…"/>
            </div>
          </div>
          <div class="col-sm-6 col-md-3">
            <input type="text" id="payNameFilter" class="form-control form-control-sm" placeholder="Filtr podle jména nájemce"/>
          </div>
          <div class="col-6 col-md-2">
            <select id="payTypeFilter" class="form-select form-select-sm">
              <option value="">Všechny typy</option>
              <option value="RENT">Nájem</option>
              <option value="UTILITY">Energie</option>
            </select>
          </div>
          <div class="col-6 col-md-2">
            <select id="payStatusFilter" class="form-select form-select-sm">
              <option value="">Všechny stavy</option>
              <option value="PAID">Zaplaceno</option>
              <option value="UNPAID">Nezaplaceno</option>
              <option value="PARTIALLY_PAID">Částečně</option>
            </select>
          </div>
        </div>
        <div class="table-responsive">
          <table id="paymentsTable" class="table table-hover mb-0">
            <thead>
              <tr>
                <th>Nájemce</th><th>Jednotka</th><th>Splatnost</th>
                <th>Přijato</th><th>Typ</th><th class="text-end">Částka</th><th>VS</th><th>Stav</th>
              </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${payments}">
              <td th:text="${p.contract.tenant.name}">—</td>
              <td th:text="${p.contract.unit.property.address + ' / ' + p.contract.unit.unitNumber}">—</td>
              <td th:attr="data-order=${p.dueDate}">
                <span th:if="${p.dueDate.isBefore(#temporals.createToday()) and p.status.name()!='PAID'}"
                      class="text-danger fw-semibold" th:text="${#temporals.format(p.dueDate,'d.M.yyyy')}">—</span>
                <span th:unless="${p.dueDate.isBefore(#temporals.createToday()) and p.status.name()!='PAID'}"
                      th:text="${#temporals.format(p.dueDate,'d.M.yyyy')}">—</span>
              </td>
              <td th:attr="data-order=${p.receivedDate}"
                  th:text="${p.receivedDate != null ? #temporals.format(p.receivedDate,'d.M.yyyy') : '—'}">—</td>
              <!-- data-search lets DataTables filter by enum value; display shows Czech label -->
              <td th:attr="data-search=${p.type.name()}">
                <span th:if="${p.type.name()=='RENT'}" class="badge bg-primary-subtle text-primary">Nájem</span>
                <span th:if="${p.type.name()=='UTILITY'}" class="badge bg-secondary-subtle text-secondary">Energie</span>
              </td>
              <td class="text-end fw-semibold" th:attr="data-order=${p.amount}"
                  th:text="${#numbers.formatDecimal(p.amount,0,'COMMA',0,'POINT')} + ' Kč'">—</td>
              <td><code th:text="${p.variableSymbol}">—</code></td>
              <!-- data-search lets DataTables filter by enum value -->
              <td th:attr="data-search=${p.status.name()}">
                <span th:if="${p.status.name()=='PAID'}" class="badge badge-paid">Zaplaceno</span>
                <span th:if="${p.status.name()=='UNPAID'}" class="badge badge-unpaid">Nezaplaceno</span>
                <span th:if="${p.status.name()=='PARTIALLY_PAID'}" class="badge badge-partial">Částečně</span>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
  $(function() {
    var defaultOrder = [2, 'desc'];
    var dt = $('#paymentsTable').DataTable({
      language: {
        sEmptyTable:   "Tabulka neobsahuje žádná data",
        sInfo:         "Zobrazuji _START_ až _END_ z _TOTAL_ záznamů",
        sInfoEmpty:    "Zobrazuji 0 z 0 záznamů",
        sInfoFiltered: "(filtrováno z _MAX_ záznamů)",
        sZeroRecords:  "Žádné záznamy neodpovídají",
        oPaginate: { sFirst: "První", sLast: "Poslední", sNext: "Další", sPrevious: "Předchozí" }
      },
      order: [defaultOrder],
      pageLength: 25,
      dom: 'tip'
    });

    $('#paySearch').on('keyup',    function() { dt.search(this.value).draw(); });
    $('#payNameFilter').on('keyup', function() { dt.column(0).search(this.value).draw(); });
    $('#payTypeFilter').on('change', function() { dt.column(4).search(this.value).draw(); });
    $('#payStatusFilter').on('change', function() { dt.column(7).search(this.value).draw(); });
  });
  </script>

</th:block>
</div>
</body>
</html>
