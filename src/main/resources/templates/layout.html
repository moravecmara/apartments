<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${title} + ' | RentFlow'">RentFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body { background-color: #f5f6fa; }
    .sidebar { min-height: 100vh; background: linear-gradient(180deg,#1a1f5e 0%,#2d3494 100%); }
    .sidebar .nav-link { color: rgba(255,255,255,.75); border-radius: 8px; margin-bottom: 2px; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,.15); }
    .sidebar .brand { color:#fff; font-weight:700; font-size:1.3rem; padding:1.5rem 1rem; }
    .stat-card { border:none; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.08); }
    .stat-card .icon { width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.4rem; }
    .badge-unpaid { background:#fff3cd;color:#856404; }
    .badge-paid { background:#d1e7dd;color:#0f5132; }
    .badge-partial { background:#cfe2ff;color:#084298; }
    .table th { font-size:.8rem; text-transform:uppercase; color:#6c757d; font-weight:600; }
    @media(max-width:768px){ .sidebar{ min-height:auto; } }
  </style>
</head>

<body th:fragment="layout(title, content)" class="d-flex">
<div class="d-flex w-100" style="min-height:100vh">
  <!-- Sidebar -->
  <nav class="sidebar d-flex flex-column p-3" style="width:240px;min-width:240px">
    <div class="brand"><i class="bi bi-house-heart-fill me-2"></i>RentFlow</div>
    <ul class="nav flex-column flex-grow-1">
      <li class="nav-item">
        <a class="nav-link" th:classappend="${#httpServletRequest.requestURI=='/dashboard'?'active':''}" href="/dashboard">
          <i class="bi bi-speedometer2 me-2"></i>Dashboard
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" th:classappend="${#httpServletRequest.requestURI.startsWith('/properties')?'active':''}" href="/properties">
          <i class="bi bi-buildings me-2"></i>Nemovitosti
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" th:classappend="${#httpServletRequest.requestURI.startsWith('/tenants')?'active':''}" href="/tenants">
          <i class="bi bi-people me-2"></i>Nájemci
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" th:classappend="${#httpServletRequest.requestURI.startsWith('/payments')?'active':''}" href="/payments">
          <i class="bi bi-credit-card me-2"></i>Platby
        </a>
      </li>
    </ul>
    <div class="border-top border-white border-opacity-25 pt-3">
      <small class="text-white-50 d-block mb-2" sec:authentication="name">user</small>
      <a href="/logout" class="nav-link"><i class="bi bi-box-arrow-left me-2"></i>Odhlásit se</a>
    </div>
  </nav>
  <!-- Main content -->
  <main class="flex-grow-1 p-4">
    <div th:replace="${content}"><!-- page content --></div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
