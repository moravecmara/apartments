<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Nájemci')}"></head>
<body>
<div th:replace="~{layout :: layout('Nájemci', ~{::content})}">
<th:block th:fragment="content">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="bi bi-people me-2 text-primary"></i>Nájemci</h4>
  </div>

  <div class="card stat-card">
    <div class="card-body">
      <div th:if="${#lists.isEmpty(tenants)}" class="text-center py-5 text-muted">
        <i class="bi bi-people fs-1"></i><p class="mt-2">Žádní nájemci.</p>
      </div>
      <div th:if="${!#lists.isEmpty(tenants)}">
        <div class="row g-2 mb-3">
          <div class="col-sm-6 col-md-4">
            <div class="input-group input-group-sm">
              <span class="input-group-text"><i class="bi bi-search"></i></span>
              <input type="text" id="tenantSearch" class="form-control" placeholder="Hledat kdekoliv…"/>
            </div>
          </div>
          <div class="col-sm-6 col-md-3">
            <input type="text" id="tenantNameFilter" class="form-control form-control-sm" placeholder="Filtr podle jména"/>
          </div>
        </div>
        <div class="table-responsive">
          <table id="tenantsTable" class="table table-hover mb-0">
            <thead>
              <tr><th>Jméno</th><th>Email</th><th>Telefon</th><th>Bankovní účet</th></tr>
            </thead>
            <tbody>
            <tr th:each="t : ${tenants}">
              <td th:text="${t.name}">—</td>
              <td><a th:href="'mailto:' + ${t.email}" th:text="${t.email}">—</a></td>
              <td th:text="${t.phone ?: '—'}">—</td>
              <td><code th:text="${t.bankAccountNumber ?: '—'}">—</code></td>
            </tr>
            </tbody>
          </table>
        </div>
        <div id="tenants-pager" class="mt-2"></div>
      </div>
    </div>
  </div>

  <script>
  $(function() {
    var sortCol = [0, 'asc'];
    var dt = $('#tenantsTable').DataTable({
      language: {
        sEmptyTable: "Tabulka neobsahuje žádná data",
        sInfo: "Zobrazuji _START_ až _END_ z _TOTAL_ záznamů",
        sInfoEmpty: "Zobrazuji 0 z 0 záznamů",
        sInfoFiltered: "(filtrováno z _MAX_ záznamů)",
        sZeroRecords: "Žádné záznamy neodpovídají",
        oPaginate: { sFirst: "První", sLast: "Poslední", sNext: "Další", sPrevious: "Předchozí" }
      },
      order: [sortCol],
      pageLength: 25,
      dom: 'tip'
    });
    $('#tenantSearch').on('keyup', function() { dt.search(this.value).draw(); });
    $('#tenantNameFilter').on('keyup', function() { dt.column(0).search(this.value).draw(); });
  });
  </script>

</th:block>
</div>
</body>
</html>
