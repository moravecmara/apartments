<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('Dashboard')}"></head>
<body>
<div th:replace="~{layout :: layout('Dashboard', ~{::content})}">
<th:block th:fragment="content">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h4 class="mb-0 fw-bold">Dashboard</h4>
      <small class="text-muted">Vítejte zpět, <span th:text="${landlordName}">Pronajímatel</span></small>
    </div>
    <span class="badge bg-primary-subtle text-primary px-3 py-2" th:text="${#temporals.format(#temporals.createNow(),'d. M. yyyy')}">dnes</span>
  </div>

  <!-- Stat cards -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="card stat-card p-3">
        <div class="d-flex align-items-center gap-3">
          <div class="icon bg-primary bg-opacity-10 text-primary"><i class="bi bi-buildings"></i></div>
          <div>
            <div class="fw-bold fs-4" th:text="${propertyCount}">0</div>
            <small class="text-muted">Nemovitosti</small>
          </div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card p-3">
        <div class="d-flex align-items-center gap-3">
          <div class="icon bg-success bg-opacity-10 text-success"><i class="bi bi-door-open"></i></div>
          <div>
            <div class="fw-bold fs-4"><span th:text="${occupiedCount}">0</span>/<span th:text="${unitCount}">0</span></div>
            <small class="text-muted">Obsazeno</small>
          </div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card p-3">
        <div class="d-flex align-items-center gap-3">
          <div class="icon bg-warning bg-opacity-10 text-warning"><i class="bi bi-exclamation-circle"></i></div>
          <div>
            <div class="fw-bold fs-4" th:text="${overdueCount}">0</div>
            <small class="text-muted">Po splatnosti</small>
          </div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card p-3">
        <div class="d-flex align-items-center gap-3">
          <div class="icon bg-info bg-opacity-10 text-info"><i class="bi bi-cash-coin"></i></div>
          <div>
            <div class="fw-bold fs-5" th:text="${#numbers.formatDecimal(monthlyRent,0,'COMMA',0,'POINT')} + ' Kč'">0 Kč</div>
            <small class="text-muted">Nájem/měsíc</small>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-4">
    <!-- Overdue payments -->
    <div class="col-md-6">
      <div class="card stat-card">
        <div class="card-header bg-transparent fw-semibold border-0 pt-3 pb-0">
          <i class="bi bi-exclamation-triangle-fill text-warning me-2"></i>Platby po splatnosti
        </div>
        <div class="card-body p-0">
          <div th:if="${#lists.isEmpty(overduePayments)}" class="text-center text-muted py-4">
            <i class="bi bi-check-circle fs-2 text-success"></i><br/>Žádné platby po splatnosti
          </div>
          <table th:if="${!#lists.isEmpty(overduePayments)}" class="table table-hover mb-0">
            <thead><tr><th>Nájemce</th><th>Splatnost</th><th>Částka</th><th>VS</th></tr></thead>
            <tbody>
            <tr th:each="p : ${overduePayments}">
              <td th:text="${p.contract.tenant.name}">—</td>
              <td><span class="text-danger" th:text="${#temporals.format(p.dueDate,'d.M.yyyy')}">—</span></td>
              <td th:text="${#numbers.formatDecimal(p.amount,0,'COMMA',0,'POINT')} + ' Kč'">—</td>
              <td><code th:text="${p.variableSymbol}">—</code></td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Recent payments -->
    <div class="col-md-6">
      <div class="card stat-card">
        <div class="card-header bg-transparent fw-semibold border-0 pt-3 pb-0">
          <i class="bi bi-clock-history text-primary me-2"></i>Poslední platby
        </div>
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead><tr><th>Nájemce</th><th>Splatnost</th><th>Částka</th><th>Stav</th></tr></thead>
            <tbody>
            <tr th:each="p : ${recentPayments}">
              <td th:text="${p.contract.tenant.name}">—</td>
              <td th:text="${#temporals.format(p.dueDate,'d.M.yyyy')}">—</td>
              <td th:text="${#numbers.formatDecimal(p.amount,0,'COMMA',0,'POINT')} + ' Kč'">—</td>
              <td>
                <span th:if="${p.status.name()=='PAID'}" class="badge badge-paid">Zaplaceno</span>
                <span th:if="${p.status.name()=='UNPAID'}" class="badge badge-unpaid">Nezaplaceno</span>
                <span th:if="${p.status.name()=='PARTIALLY_PAID'}" class="badge badge-partial">Částečně</span>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

</th:block>
</div>
</body>
</html>
