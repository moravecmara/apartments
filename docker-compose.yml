version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rentflow
      POSTGRES_USER: rentflow
      POSTGRES_PASSWORD: rentflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/rentflow
      SPRING_DATASOURCE_USERNAME: rentflow
      SPRING_DATASOURCE_PASSWORD: rentflow
      APP_JWT_SECRET: rentflow-demo-secret-key-must-be-at-least-32-characters
      APP_JWT_EXPIRATION_MS: 86400000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
